<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scanlines" x="0" y="0" width="100%" height="100%">
      <feTile id="tile">
        <feFlood flood-color="rgba(0,0,0,0.18)" result="flood" x="0" y="0" width="64" height="2"/>
      </feTile>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#bg)" rx="8"/>

  <!-- Corner brackets -->
  <g stroke="#166534" stroke-width="1.5" fill="none" opacity="0.7">
    <polyline points="4,12 4,4 12,4"/>
    <polyline points="52,4 60,4 60,12"/>
    <polyline points="4,52 4,60 12,60"/>
    <polyline points="52,60 60,60 60,52"/>
  </g>

  <!-- Outer border -->
  <rect x="2" y="2" width="60" height="60" rx="7" fill="none" stroke="#15803d" stroke-width="0.5" opacity="0.4"/>

  <!-- BW text -->
  <text
    x="32" y="32"
    font-family="monospace, Courier New"
    font-size="32"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="central"
    fill="#4ade80"
    filter="url(#glow)"
    letter-spacing="2"
  >BW</text>



  <!-- Scanline overlay -->
  <rect width="64" height="64" rx="8" fill="none"
    style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px)"/>

  <!-- Subtle horizontal scan lines -->
  <line x1="0" y1="16" x2="64" y2="16" stroke="rgba(0,255,0,0.03)" stroke-width="1"/>
  <line x1="0" y1="32" x2="64" y2="32" stroke="rgba(0,255,0,0.03)" stroke-width="1"/>
  <line x1="0" y1="48" x2="64" y2="48" stroke="rgba(0,255,0,0.03)" stroke-width="1"/>
</svg>
